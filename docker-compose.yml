services:
  postgres:
    image: postgres:16-alpine
    container_name: poolproject-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: poolproject
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - poolproject_postgres_data:/var/lib/postgresql/data

volumes:
  poolproject_postgres_data:
